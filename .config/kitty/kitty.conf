mouse_map ctrl+left release grabbed,ungrabbed mouse_handle_click link
copy_on_select yes
strip_trailing_spaces smart
clipboard_control write-primary write-clipboard
allow_remote_control yes

# Tab bar — always visible at top, shows repo name + app when relevant
tab_bar_min_tabs 1
tab_bar_edge top
tab_bar_style fade
tab_title_template "{tab.active_wd.rsplit('/', 1)[-1]}{(' · ' + title) if title != tab.active_wd.rsplit('/', 1)[-1] else ''}"

# Theme
include current-theme.conf
